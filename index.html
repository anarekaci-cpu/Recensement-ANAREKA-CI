<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recensement Bingerville — Carte de suivi terrain</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://tile.openstreetmap.org">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
  :root { --vert: #1B5E20; --or: #E67E22; --noir: #222222; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; font-family: Arial, sans-serif; background:#f4f4f4; }
  #app { display:flex; flex-direction:column; height:100%; }
  header { background: var(--vert); color:white; padding:10px 14px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; z-index:1000; }
  header h1 { font-size:16px; margin:0; }
  header .stats { font-size:12px; opacity:0.95; }
  #controls { background:white; padding:8px 12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; border-bottom:1px solid #ddd; z-index:999; }
  #controls label { font-size:12px; color:#333; display:flex; align-items:center; gap:4px; }
  #controls select, #controls input[type=text] { padding:5px 7px; font-size:13px; border:1px solid #ccc; border-radius:4px; }
  #main { flex:1; position:relative; min-height:0; }
  #map { position:absolute; top:0; left:0; right:0; bottom:0; background:#e8e8e8; }
  .legend { position:absolute; bottom:14px; left:10px; background:white; padding:8px 10px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,0.3); font-size:12px; z-index:800; line-height:1.6; }
  .legend .dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-right:6px; vertical-align:middle; border:1px solid #0003; }
  .popup-title { font-weight:bold; font-size:14px; margin-bottom:4px; }
  .popup-row { font-size:12.5px; margin:2px 0; }
  .popup-status { display:inline-block; padding:2px 6px; border-radius:4px; font-size:11px; font-weight:bold; margin-top:4px; }
  .visit-btn { margin-top:8px; width:100%; padding:8px; border:none; border-radius:5px; font-size:13px; font-weight:bold; cursor:pointer; color:white; }
  .btn-visit { background: var(--vert); }
  .btn-unvisit { background:#999; }
  #resetBtn { background:#c0392b; color:white; border:none; padding:6px 10px; border-radius:4px; font-size:12px; cursor:pointer; }
  #exportBtn { background:#2980b9; color:white; border:none; padding:6px 10px; border-radius:4px; font-size:12px; cursor:pointer; }
  #loading { position:absolute; inset:0; background:white; display:flex; align-items:center; justify-content:center; font-size:14px; color:#555; z-index:2000; transition:opacity .2s ease; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🗺️ Recensement ANAREKA-CI — Bingerville</h1>
    <div class="stats" id="statsHeader">Chargement…</div>
    <div class="stats" id="syncStatus" style="font-weight:bold;">🟡 Connexion...</div>
  </header>
  <div id="controls">
    <label>Bloc: <select id="filterBlock"><option value="all">Tous</option></select></label>
    <label>Statut: <select id="filterStatus">
      <option value="all">Tous</option>
      <option value="VERT (Joignable)">Vert (Joignable)</option>
      <option value="JAUNE (Injoignable)">Jaune (Injoignable)</option>
      <option value="ROUGE (Refus)">Rouge (Refus)</option>
      <option value="VIOLET (A verifier)">Violet (à vérifier)</option>
      <option value="NON DEFINI">Non défini</option>
    </select></label>
    <label>Visite: <select id="filterVisited">
      <option value="all">Tous</option>
      <option value="no">Non visités</option>
      <option value="yes">Déjà visités</option>
    </select></label>
    <label>Recherche: <input type="text" id="searchBox" placeholder="Nom, quartier..." /></label>
    <button id="exportBtn">⬇️ Exporter suivi (CSV)</button>
    <button id="resetBtn">🗑️ Réinitialiser mes marquages</button>
  </div>
  <div id="main">
    <div id="map"></div>
    <div class="legend">
      <div><b>Statut d'origine</b></div>
      <div><span class="dot" style="background:#2ecc71"></span>Vert (Joignable)</div>
      <div><span class="dot" style="background:#f1c40f"></span>Jaune (Injoignable)</div>
      <div><span class="dot" style="background:#e74c3c"></span>Rouge (Refus)</div>
      <div><span class="dot" style="background:#9b59b6"></span>Violet (à vérifier)</div>
      <div><span class="dot" style="background:#95a5a6"></span>Non défini</div>
      <div style="margin-top:6px; border-top:1px solid #ddd; padding-top:6px;">
        <span style="opacity:0.5;">⬤</span> = déjà visité (assombri)
      </div>
    </div>
    <div id="loading">Chargement de la carte…</div>
  </div>
</div>

<!-- Leaflet + plugins chargés en fin de body : le HTML/CSS s'affiche avant que le JS ne bloque -->
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="./data.js"></script>

<script>
// ==================== SCRIPTS PRINCIPAUX ====================
const STATUS_COLOR = {
  'VERT (Joignable)': '#2ecc71',
  'JAUNE (Injoignable)': '#f1c40f',
  'ROUGE (Refus)': '#e74c3c',
  'VIOLET (A verifier)': '#9b59b6',
  'NON DEFINI': '#95a5a6'
};

const SUPABASE_URL = 'https://xqfdhgrdvsdngfgiuomk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8Vyba1dTaQDTx1EuDz9naQ__fvezy3N';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let visited = {};
let markerRefs = {};
let markersCluster;

const iconCache = {};
function getIcon(color, isVis) {
  const key = color + (isVis ? '_v' : '_n');
  if (iconCache[key]) return iconCache[key];
  const opacity = isVis ? 0.45 : 1;
  const stroke = isVis ? '#555' : '#222';
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">'
    + '<path d="M13 0C6 0 0 6 0 13c0 9 13 21 13 21s13-12 13-21C26 6 20 0 13 0z" fill="' + color + '" fill-opacity="' + opacity + '" stroke="' + stroke + '" stroke-width="1.5"/>'
    + '<circle cx="13" cy="13" r="5.5" fill="white" fill-opacity="' + (isVis ? 0.85 : 1) + '"/>'
    + (isVis ? '<path d="M9 13l2.5 2.5L17 10" stroke="#2e7d32" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>' : '')
    + '</svg>';
  const icon = L.divIcon({ html: svg, className: '', iconSize: [26, 34], iconAnchor: [13, 34], popupAnchor: [0, -30] });
  iconCache[key] = icon;
  return icon;
}

async function loadVisited() {
  try {
    const { data, error } = await supabaseClient.from('visites').select('point_id, visited_at, visited_by');
    if (error) throw error;
    visited = {};
    (data || []).forEach(row => {
      visited[row.point_id] = { at: row.visited_at, by: row.visited_by || '' };
    });
  } catch (e) {
    console.error('Erreur chargement Supabase', e);
    visited = {};
  }
}

async function markVisited(id, who) {
  const record = { at: new Date().toISOString(), by: who || '' };
  visited[id] = record;
  try {
    const { error } = await supabaseClient.from('visites').upsert({
      point_id: id, visited_at: record.at, visited_by: record.by
    });
    if (error) throw error;
  } catch (e) {
    console.error('Erreur sauvegarde Supabase', e);
  }
}

async function unmarkVisited(id) {
  delete visited[id];
  try {
    const { error } = await supabaseClient.from('visites').delete().eq('point_id', id);
    if (error) throw error;
  } catch (e) {
    console.error('Erreur suppression Supabase', e);
  }
}

function isVisited(id) { return !!visited[id]; }

function applyRemoteChange(eventType, newRow, oldRow) {
  const id = eventType === 'DELETE' ? oldRow.point_id : newRow.point_id;
  if (!id) return;
  const pt = DATA.find(p => p.id === id);
  if (!pt) return;
  if (eventType === 'DELETE') { delete visited[id]; }
  else { visited[id] = { at: newRow.visited_at, by: newRow.visited_by || '' }; }
  refreshMarker(pt);
  updateStats();
}

function subscribeRealtime() {
  const statusEl = document.getElementById('syncStatus');
  supabaseClient
    .channel('visites-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'visites' }, (payload) => {
      applyRemoteChange(payload.eventType, payload.new, payload.old);
    })
    .subscribe((status) => {
      if (!statusEl) return;
      if (status === 'SUBSCRIBED') {
        statusEl.textContent = '🟢 Sync en direct';
        statusEl.title = 'Connecté — les marquages des autres agents apparaissent automatiquement';
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        statusEl.textContent = '🔴 Sync hors ligne';
        statusEl.title = 'Reconnexion en cours... vérifiez votre connexion internet';
      } else {
        statusEl.textContent = '🟡 Connexion...';
      }
    });
}

function attachPopup(marker, pt) {
  marker.bindPopup(() => buildPopupContent(pt), { minWidth: 230 });
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s === undefined || s === null ? '' : String(s);
  return div.innerHTML;
}

function buildPopupContent(pt) {
  const div = document.createElement('div');
  const vis = isVisited(pt.id);
  const color = STATUS_COLOR[pt.status] || '#95a5a6';
  div.innerHTML = ''
    + '<div class="popup-title">' + pt.order + '. ' + esc(pt.name || '(sans nom)') + (vis ? ' <span style="color:#2e7d32">✔ Visité</span>' : '') + '</div>'
    + '<div class="popup-row"><b>Bloc:</b> ' + String(pt.block).padStart(2,'0') + ' — Ordre ' + pt.order + '</div>'
    + '<div class="popup-row"><b>Téléphone:</b> ' + esc(pt.tel || '—') + '</div>'
    + '<div class="popup-row"><b>Quartier:</b> ' + esc(pt.quartier || '—') + '</div>'
    + '<div class="popup-row"><b>Adresse:</b> ' + esc(pt.address || '—') + '</div>'
    + '<div class="popup-row"><b>Produits:</b> ' + esc(pt.produits || '—') + '</div>'
    + '<div class="popup-status" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + ';">' + esc(pt.status) + '</div>'
    + '<br/>'
    + '<button class="visit-btn ' + (vis ? 'btn-unvisit' : 'btn-visit') + '" data-id="' + pt.id + '">'
    + (vis ? '↩️ Annuler la visite' : '✅ Marquer comme visité')
    + '</button>';
  const btn = div.querySelector('.visit-btn');
  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.textContent = '...';
    if (isVisited(pt.id)) { await unmarkVisited(pt.id); }
    else { await markVisited(pt.id); }
    refreshMarker(pt);
    updateStats();
  });
  return div;
}

function refreshMarker(pt) {
  const m = markerRefs[pt.id];
  if (!m) return;
  const color = STATUS_COLOR[pt.status] || '#95a5a6';
  m.setIcon(getIcon(color, isVisited(pt.id)));
  if (m.isPopupOpen && m.isPopupOpen()) {
    m.setPopupContent(buildPopupContent(pt));
  }
}

function passesFilters(pt) {
  const b = document.getElementById('filterBlock').value;
  const s = document.getElementById('filterStatus').value;
  const v = document.getElementById('filterVisited').value;
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  if (b !== 'all' && String(pt.block) !== b) return false;
  if (s !== 'all' && pt.status !== s) return false;
  if (v === 'yes' && !isVisited(pt.id)) return false;
  if (v === 'no' && isVisited(pt.id)) return false;
  if (q) {
    const hay = (pt.name + ' ' + pt.quartier + ' ' + pt.address).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function buildAllMarkers() {
  DATA.forEach(pt => {
    const color = STATUS_COLOR[pt.status] || '#95a5a6';
    const marker = L.marker([pt.lat, pt.lon], { icon: getIcon(color, isVisited(pt.id)) });
    attachPopup(marker, pt);
    markerRefs[pt.id] = marker;
  });
}

function renderMarkers() {
  markersCluster.clearLayers();
  const toAdd = [];
  DATA.forEach(pt => {
    if (passesFilters(pt)) toAdd.push(markerRefs[pt.id]);
  });
  markersCluster.addLayers(toAdd);
  updateStats();
}

function updateStats() {
  const total = DATA.length;
  const visitedCount = DATA.filter(pt => isVisited(pt.id)).length;
  const pct = total ? Math.round((visitedCount/total)*100) : 0;
  document.getElementById('statsHeader').textContent = visitedCount + ' / ' + total + ' visités (' + pct + '%)';
}

function populateBlockFilter() {
  const sel = document.getElementById('filterBlock');
  const blocks = [...new Set(DATA.map(p => p.block))].sort((a,b) => a-b);
  const frag = document.createDocumentFragment();
  blocks.forEach(b => {
    const opt = document.createElement('option');
    opt.value = String(b);
    opt.textContent = 'Bloc ' + String(b).padStart(2,'0');
    frag.appendChild(opt);
  });
  sel.appendChild(frag);
}

function exportCSV() {
  let rows = [['Bloc','Ordre','Nom','Telephone','Quartier','Adresse','Statut','Visite','Date_visite']];
  DATA.forEach(pt => {
    const v = visited[pt.id];
    rows.push([pt.block, pt.order, pt.name, pt.tel, pt.quartier, pt.address, pt.status, v ? 'OUI' : 'NON', v ? v.at : '']);
  });
  const csv = rows.map(r => r.map(c => '"' + String(c===undefined||c===null?'':c).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'suivi_visites_bingerville.csv'; a.click();
  URL.revokeObjectURL(url);
}

let debounceTimer = null;
function debouncedRender() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderMarkers, 150);
}

async function init() {
  const map = L.map('map', { zoomControl: true, preferCanvas: true }).setView([5.355, -3.885], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap',
    updateWhenIdle: true,
    keepBuffer: 2
  }).addTo(map);

  markersCluster = L.markerClusterGroup({
    maxClusterRadius: 50,
    spiderfyOnMaxZoom: false,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    chunkedLoading: true,
    chunkInterval: 50,
    chunkDelay: 20,
    disableClusteringAtZoom: 17
  });
  map.addLayer(markersCluster);

  populateBlockFilter();
  buildAllMarkers();
  document.getElementById('loading').style.display = 'none';

  await loadVisited();
  renderMarkers();
  subscribeRealtime();

  document.getElementById('filterBlock').addEventListener('change', debouncedRender);
  document.getElementById('filterStatus').addEventListener('change', debouncedRender);
  document.getElementById('filterVisited').addEventListener('change', debouncedRender);
  document.getElementById('searchBox').addEventListener('input', debouncedRender);
  document.getElementById('exportBtn').addEventListener('click', exportCSV);
  document.getElementById('resetBtn').addEventListener('click', async () => {
    if (confirm("Effacer tous les marquages de visite partagés par toute l'équipe ? Cette action est irréversible.")) {
      try {
        const { error } = await supabaseClient.from('visites').delete().neq('point_id', '');
        if (error) throw error;
      } catch (e) { console.error('Erreur reset Supabase', e); }
      visited = {};
      renderMarkers();
    }
  });
}

init();
</script>
</body>
</html>
